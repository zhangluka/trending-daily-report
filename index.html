<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Trending Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f5;
  --ink: #1a1918;
  --ink-soft: #6b6966;
  --ink-muted: #9e9b97;
  --accent: #c4603c;
  --rule: #e8e6e1;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Geist Sans', -apple-system, sans-serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 640px;
  margin: 0 auto;
  padding: 5rem 2rem 6rem;
}

h1 {
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.15;
  margin-bottom: 0.75rem;
}

.subtitle {
  font-size: 1rem;
  color: var(--ink-soft);
  margin-bottom: 3rem;
}

.list-label {
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 1.5rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--rule);
}

.report-list {
  list-style: none;
}

.report-list li {
  margin-bottom: 1rem;
}

.report-list a {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  padding: 0.75rem 0;
  text-decoration: none;
  color: var(--ink);
  border-bottom: 1px solid var(--rule);
  transition: color 0.15s;
}

.report-list a:hover {
  color: var(--accent);
}

.report-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  color: var(--ink-muted);
  min-width: 7rem;
}

.report-title {
  font-size: 0.95rem;
  font-weight: 500;
}

.report-arrow {
  margin-left: auto;
  color: var(--ink-muted);
  font-size: 0.85rem;
  transition: transform 0.15s;
}

.report-list a:hover .report-arrow {
  transform: translateX(3px);
  color: var(--accent);
}

.empty {
  font-size: 0.9rem;
  color: var(--ink-muted);
  padding: 2rem 0;
}

.footer {
  margin-top: 5rem;
  padding-top: 2rem;
  border-top: 1px solid var(--rule);
  font-size: 0.75rem;
  color: var(--ink-muted);
  display: flex;
  justify-content: space-between;
}

.footer a {
  color: var(--ink-muted);
  text-decoration: none;
  border-bottom: 1px solid transparent;
}

.footer a:hover {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

@media (max-width: 640px) {
  .page { padding: 3rem 1.25rem 4rem; }
  h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>
<div class="page">

  <h1>GitHub Trending Daily</h1>
  <div class="subtitle">每天精选 GitHub Trending Top 10 项目，AI 深度分析。</div>

  <div class="list-label">日报存档</div>

  <ul class="report-list" id="reports">
    <li><a href="2026-06-03/dashboard.html">
      <span class="report-date">2026-06-03</span>
      <span class="report-title">headroom · ECC · markitdown · hermes-agent · trivy</span>
      <span class="report-arrow">&rarr;</span>
    </a></li>
  </ul>

  <footer class="footer">
    <div>Built with <a href="https://github.com/zhangluka/trending-daily-report">GitHub Pages</a></div>
    <div>Updated daily at 10:03 AM</div>
  </footer>

</div>

<script>
// Auto-generate report list from directory structure
// This script reads a manifest.json if available, otherwise falls back to static HTML
fetch('manifest.json')
  .then(r => r.ok ? r.json() : null)
  .then(data => {
    if (!data || !data.reports) return;
    const list = document.getElementById('reports');
    list.innerHTML = '';
    data.reports.forEach(r => {
      const li = document.createElement('li');
      li.innerHTML = `<a href="${r.date}/dashboard.html">
        <span class="report-date">${r.date}</span>
        <span class="report-title">${r.top3}</span>
        <span class="report-arrow">&rarr;</span>
      </a>`;
      list.appendChild(li);
    });
  })
  .catch(() => {});
</script>
</body>
</html>
